<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ficha de Anamnese — ZONCLI</title>
<link href="https://fonts.googleapis.com/css2?family=Jura:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --cyan:    #00C8FF;
  --violet:  #7B5FFF;
  --magenta: #FF1F8E;
  --bg:      #0D1117;
  --bg2:     #111827;
  --bg3:     #1E2535;
  --text:    #EFEFEF;
  --muted:   #888780;
  --border:  #1E2535;
  --grad:    linear-gradient(135deg, #00C8FF 0%, #7B5FFF 50%, #FF1F8E 100%);
}
body {
  background: var(--bg); color: var(--text);
  font-family: 'Inter', sans-serif; line-height: 1.6;
  min-height: 100vh; display: flex; flex-direction: column; align-items: center;
  padding: 0 0 48px;
}
body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 60% 40% at 20% 20%, rgba(0,200,255,.05) 0%, transparent 65%),
    radial-gradient(ellipse 50% 40% at 80% 80%, rgba(255,31,142,.04) 0%, transparent 65%);
}

/* Header */
.header {
  width: 100%; background: rgba(13,17,23,0.95);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  padding: 16px 24px; gap: 10px; position: sticky; top: 0; z-index: 10;
  backdrop-filter: blur(12px);
}
.logo {
  font-family: 'Jura', sans-serif; font-weight: 700; font-size: 20px;
  background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.header-sub { color: var(--muted); font-size: 13px; }

/* Content */
.content { width: 100%; max-width: 520px; padding: 24px 16px 0; }

/* Card */
.card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 12px; padding: 24px; margin-bottom: 16px;
}

/* Form elements */
.section-title {
  font-size: 11px; font-weight: 600; color: var(--muted);
  text-transform: uppercase; letter-spacing: .5px; margin-bottom: 16px;
}
.question { margin-bottom: 24px; }
.question label {
  display: block; font-size: 15px; font-weight: 500;
  margin-bottom: 10px; line-height: 1.4;
}
.alert-dot { color: var(--magenta); font-size: 12px; }
.radio-row { display: flex; gap: 12px; margin-bottom: 8px; }
.radio-btn {
  flex: 1; padding: 12px; background: var(--bg3);
  border: 2px solid var(--bg3); border-radius: 8px;
  text-align: center; cursor: pointer; font-size: 14px;
  font-weight: 600; transition: all .15s; color: var(--text);
}
.radio-btn.selected { border-color: var(--violet); background: rgba(123,95,255,.12); color: var(--violet); }
.checkbox-option {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; background: var(--bg3);
  border: 2px solid var(--bg3); border-radius: 8px;
  margin-bottom: 8px; cursor: pointer; font-size: 14px; color: var(--text);
}
.checkbox-option.selected { border-color: var(--violet); background: rgba(123,95,255,.12); }
.checkbox-box {
  width: 20px; height: 20px; border: 2px solid var(--muted);
  border-radius: 4px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.checkbox-option.selected .checkbox-box { border-color: var(--violet); background: var(--violet); }
input[type=text], textarea {
  width: 100%; background: var(--bg3); border: 1px solid var(--border);
  border-radius: 8px; padding: 12px; color: var(--text);
  font-size: 14px; font-family: inherit; outline: none;
}
input[type=text]:focus, textarea:focus { border-color: var(--violet); }
.follow-up { margin-top: 10px; display: none; }
.follow-up.show { display: block; }

/* Name + Declaration */
.name-field { margin-bottom: 16px; }
.name-field label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
.declaration {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 14px; background: var(--bg3); border: 1px solid var(--border);
  border-radius: 8px; margin-bottom: 16px; cursor: pointer;
}
.decl-box {
  width: 22px; height: 22px; border: 2px solid var(--muted);
  border-radius: 4px; flex-shrink: 0; margin-top: 1px;
  display: flex; align-items: center; justify-content: center;
}
.decl-box.checked { border-color: var(--cyan); background: var(--cyan); }
.decl-text { font-size: 13px; color: var(--muted); line-height: 1.5; }

/* Signature */
canvas {
  border: 1px solid var(--border); border-radius: 8px;
  width: 100%; touch-action: none; background: var(--bg);
}
.clear-sig {
  background: none; border: none; color: var(--muted);
  font-size: 12px; cursor: pointer; margin-top: 6px;
  font-family: inherit;
}

/* Buttons */
.btn {
  width: 100%; padding: 16px; border-radius: 8px;
  font-size: 16px; font-weight: 700; border: none; cursor: pointer;
  background: var(--grad); color: #fff; margin-top: 8px;
  font-family: inherit; transition: opacity .15s;
}
.btn:disabled { opacity: .5; cursor: not-allowed; }

/* States */
.error-banner {
  background: rgba(255,31,142,.12); border: 1px solid var(--magenta);
  border-radius: 8px; padding: 12px 16px; color: var(--magenta);
  font-size: 13px; margin-bottom: 16px;
}
.success { text-align: center; padding: 32px 16px; }
.success .icon { font-size: 56px; margin-bottom: 16px; }
.success h2 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
.loading { text-align: center; padding: 60px 16px; }
.spinner {
  width: 40px; height: 40px; border: 3px solid var(--border);
  border-top-color: var(--violet); border-radius: 50%;
  animation: spin .7s linear infinite; margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.muted { color: var(--muted); font-size: 14px; }

/* Reconfirmation */
#full-form { display: none; }

/* Disclaimer */
.disclaimer {
  font-size: 11px; color: rgba(255,255,255,.2); text-align: center;
  margin-top: 24px; line-height: 1.6; max-width: 480px; padding: 0 16px;
}
</style>
</head>
<body>

<div class="header">
  <span class="logo">ZONCLI</span>
  <span class="header-sub">Ficha de Anamnese</span>
</div>

<div class="content" id="app">
  <div class="loading">
    <div class="spinner"></div>
    <p class="muted">Carregando ficha...</p>
  </div>
</div>

<p class="disclaimer">Questionário base ZONCLI — revisado e adaptado sob responsabilidade do responsável técnico da clínica.<br>ZONCLI não assume responsabilidade regulatória pelo conteúdo do formulário.</p>

<script>
const EDGE_FN = 'https://yltkmebcrznhdswfhssm.supabase.co/functions/v1/anamnesis-public';
const token   = new URLSearchParams(location.search).get('token');
const app     = document.getElementById('app');

function errorPage(msg) {
  app.innerHTML = `
    <div class="card" style="margin-top:40px;text-align:center">
      <p style="color:var(--magenta);font-size:18px;font-weight:600;margin-bottom:8px">Formulário indisponível</p>
      <p class="muted">${msg}</p>
    </div>`;
}

if (!token) {
  errorPage('Token inválido ou ausente.');
} else {
  // Fetch the form HTML from the Edge Function
  fetch(`${EDGE_FN}?token=${encodeURIComponent(token)}${location.search.includes('assisted') ? '&assisted=true' : ''}${location.search.includes('professional_id') ? '&professional_id=' + new URLSearchParams(location.search).get('professional_id') : ''}`)
    .then(r => r.text())
    .then(html => {
      // Extract body content from the Edge Function response
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, 'text/html');
      const body = doc.body.innerHTML;
      app.innerHTML = body;

      // Re-execute scripts from the parsed content
      const scripts = app.querySelectorAll('script');
      scripts.forEach(oldScript => {
        const newScript = document.createElement('script');
        newScript.textContent = oldScript.textContent
          .replace(/fetch\(location\.href/g, `fetch('${EDGE_FN}?token=${encodeURIComponent(token)}'`);
        oldScript.parentNode.replaceChild(newScript, oldScript);
      });
    })
    .catch(() => errorPage('Não foi possível carregar o formulário. Tente novamente.'));
}
</script>

</body>
</html>

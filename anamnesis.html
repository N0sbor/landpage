<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Ficha de Anamnese — ZONCLI</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; background: #0D1117; overflow: hidden; }
#frame {
  position: fixed; inset: 0;
  width: 100%; height: 100%;
  border: none; background: #0D1117;
}
#error {
  display: none; position: fixed; inset: 0;
  background: #0D1117; color: #fff;
  font-family: sans-serif; align-items: center;
  justify-content: center; flex-direction: column;
  gap: 12px; padding: 24px; text-align: center;
}
#error .brand {
  font-size: 22px; font-weight: 700;
  background: linear-gradient(135deg,#00C8FF,#7B5FFF,#FF1F8E);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
}
#error p { color: #888780; font-size: 14px; }
</style>
</head>
<body>
<iframe id="frame"></iframe>
<div id="error">
  <div class="brand">ZONCLI</div>
  <p>Token inválido ou ausente.<br>Solicite um novo link à sua clínica.</p>
</div>
<script>
const token = new URLSearchParams(location.search).get('token');
if (!token) {
  document.getElementById('frame').style.display = 'none';
  document.getElementById('error').style.display = 'flex';
} else {
  const params = new URLSearchParams(location.search);
  params.delete('token');
  const extra = params.toString() ? '&' + params.toString() : '';
  document.getElementById('frame').src =
    'https://yltkmebcrznhdswfhssm.supabase.co/functions/v1/anamnesis-public?token=' +
    encodeURIComponent(token) + extra;
}
</script>
</body>
</html>
